# Competzy production nginx configuration.
# Drop into /etc/nginx/sites-available/competzy.conf, symlink into sites-enabled,
# and run `certbot --nginx -d competzy.com -d api.competzy.com -d admin.competzy.com -d organizer.competzy.com -d partner.competzy.com -d compete.competzy.com`
# to provision SSL.

# ── Backend API ────────────────────────────────────────────────────────────
upstream competzy_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── Web (Next.js) ──────────────────────────────────────────────────────────
upstream competzy_web {
    server 127.0.0.1:3001;
    keepalive 32;
}

# ── api.competzy.com ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.competzy.com;

    # certbot fills in ssl_certificate / ssl_certificate_key

    # Block legacy unsigned static uploads — production must use signed URLs
    # (S3 presigned in prod, /uploads-signed/<token> in dev). The backend
    # still serves /uploads/* for dev compatibility; nginx denies it in prod.
    location /uploads/ {
        return 404;
    }

    # Webhook calls from Midtrans must NOT be CORS-restricted; the backend
    # validates signatures itself.
    location / {
        proxy_pass http://competzy_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;

        # File uploads up to 10 MB (matches multer config).
        client_max_body_size 12M;
    }
}

# ── Web portals (admin, organizer, school) all served by the same Next.js app.
# Subdomain routing is handled inside the app (or by a Next middleware later).
server {
    listen 443 ssl http2;
    server_name competzy.com www.competzy.com admin.competzy.com organizer.competzy.com partner.competzy.com;

    location / {
        proxy_pass http://competzy_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Allow long polling for HMR in case dev/staging share this host.
        proxy_read_timeout 86400s;
    }
}

# ── HTTP → HTTPS redirect for everything ───────────────────────────────────
server {
    listen 80;
    server_name competzy.com www.competzy.com api.competzy.com admin.competzy.com organizer.competzy.com partner.competzy.com compete.competzy.com;
    return 301 https://$host$request_uri;
}
